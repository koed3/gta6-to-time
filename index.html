<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 6 Countdown Timer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #mute-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 2px solid #fff;
            color: #fff;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            z-index: 10;
        }
        #mute-btn:hover {
            background-color: #fff;
            color: #000;
        }
        .container {
            display: flex;
            align-items: center;
            gap: 50px;
        }
        .timer-box {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
            border: 1px solid #ff00ff;
        }
        .timer-box h1 {
            margin-top: 0;
            font-size: 24px;
            letter-spacing: 2px;
            color: #00ffff;
        }
        #clock {
            font-size: 48px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
        }
        .cd-container {
            position: relative;
            cursor: pointer;
        }
        .cd {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, #111 20%, #333 40%, #111 50%, #555 60%, #111 70%);
            border: 5px solid #222;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s;
        }
        .cd::after {
            content: '';
            width: 30px;
            height: 30px;
            background-color: #0b0b0b;
            border-radius: 50%;
            border: 2px solid #fff;
        }
        .cd:hover {
            transform: scale(1.05);
        }
        @keyframes rotateCD {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .playing {
            animation: rotateCD 3s linear infinite;
        }
        .cd-label {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <button id="mute-btn">🔊 음소거</button>

    <div class="container">
        <div class="timer-box">
            <h1>GTA VI COUNTDOWN</h1>
            <div id="clock">00d 00h 00m 00s</div>
        </div>

        <div>
            <div class="cd-container" id="cd-player">
                <div class="cd" id="cd-disk"></div>
            </div>
            <div class="cd-label">Click to Play BGM</div>
        </div>
    </div>

    <audio id="tick-sound" src="tick.mp3"></audio>
    <audio id="bgm" src="san_andreas.mp3" loop></audio>

    <script>
        const targetDate = new Date("November 19, 2026 00:00:00").getTime();
    
      const clockDisplay = document.getElementById("clock");
        const muteBtn = document.getElementById("mute-btn");
        const cdPlayer = document.getElementById("cd-player");
        const cdDisk = document.getElementById("cd-disk");
        const tickSound = document.getElementById("tick-sound");
        const bgm = document.getElementById("bgm");
    
      let isMuted = false;
        let isBgmPlaying = false;
      
      const timerInterval = setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;
       
        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);
          
        clockDisplay.innerHTML = 
                `${String(days).padStart(2, '0')}d ` +
                `${String(hours).padStart(2, '0')}h ` +
                `${String(minutes).padStart(2, '0')}m ` +
                `${String(seconds).padStart(2, '0')}s`;
         
        if (difference < 0) {
                clearInterval(timerInterval);
                clockDisplay.innerHTML = "GTA 6 RELEASED!";
                return;
            }   
        if (!isMuted) {
                tickSound.currentTime = 0; 
                tickSound.play().catch(e => console.log("유저 상호작용 필요: ", e));
            }
        }, 1000);
      
      cdPlayer.addEventListener("click", () => {
            if (isBgmPlaying) {
                bgm.pause();
                cdDisk.classList.remove("playing");
                isBgmPlaying = false;
            } else {
                if (!isMuted) {
                    bgm.play().catch(e => console.log(e));
                }
                cdDisk.classList.add("playing");
                isBgmPlaying = true;
            }
        });
        muteBtn.addEventListener("click", () => {
            if (!isMuted) {
                // 음소거 실행
                isMuted = true;
                muteBtn.innerHTML = "🔇 음성 끔";
                
                tickSound.volume = 0;
                bgm.volume = 0;
            } else {
                isMuted = false;
                muteBtn.innerHTML = "🔊 음소거";
                
                tickSound.volume = 1;
                bgm.volume = 1;

                if (isBgmPlaying) {
                    bgm.play().catch(e => console.log(e));
                }
            }
        });
    </script>
</body>
</html>
